name: Build iOS Dylib
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Theos (iOS SDK)
        run: |
          bash -c "$(curl -fsSL https://githubusercontent.com)"
          
      - name: Compile Dylib
        run: |
          xcrun -sdk iphoneos clang -dynamiclib -arch arm64 -miphoneos-version-min=14.0 -framework UIKit -framework Foundation Tweak.mm -o SecurityKey.dylib

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: KeySystem-Dylib
          path: SecurityKey.dylib
